<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print QR</title>

<style>
body {
    margin: 0;
    padding: 10px;
    background: #f5f5f5;
    font-family: Arial, sans-serif;
}

/* ✅ EXACT 50mm x 30mm */
.label {
    width: 50mm;
    height: 30mm;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;

    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;

    padding: 2mm;
    box-sizing: border-box;

    page-break-inside: avoid;
}

/* LOGO (SMALL & CLEAN) */
.logo {
    font-size: 7px;
    text-align: center;
    line-height: 1.1;
}

.logo strong {
    font-size: 9px;
    letter-spacing: 0.5px;
}

/* QR SECTION (MAX SIZE WITHOUT STRETCH) */
.qr img {
    width: 100%;
    height: auto;
    max-height: 18mm; /* keeps proportion */
    object-fit: contain;
}

/* ID TEXT */
.id {
    font-size: 8px;
    font-weight: bold;
    text-align: center;
    border-top: 1px solid #ccc;
    width: 100%;
    padding-top: 1mm;
}

/* PRINT GRID */
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
}
</style>

</head>

<body>

<div class="container">

{% for item in data %}
<div class="label">

    <!-- 🔥 COMPANY NAME (CENTERED, SMALL) -->
    <div class="logo">
        <strong>SAFETY<span style="color:#0b2c6b;">MAX</span></strong><br>
        FIRE ENGINEERS
    </div>

    <!-- 🔥 BIG QR -->
    <div class="qr">
        <img src="/qr/{{ item[0] }}">
    </div>

    <!-- 🔥 ID -->
    <div class="id">
        {{ item[0] }}
    </div>

</div>
{% endfor %}

</div>

</body>
</html>
