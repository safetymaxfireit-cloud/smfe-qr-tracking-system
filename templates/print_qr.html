<!DOCTYPE html>
<html>
<head>
    <title>QR Stickers - SafetyMax</title>

    <style>
        body {
            font-family: Arial;
            margin: 10px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .sticker {
            width: 50mm;
            height: 50mm;
            border: 1px solid black;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            page-break-inside: avoid;
        }

        .sticker img {
            width: 35mm;
            height: 35mm;
            margin: auto;
        }

        .title {
            font-size: 10px;
            font-weight: bold;
            color: red;
        }

        .id {
            font-size: 12px;
            font-weight: bold;
        }

        @media print {
            body {
                margin: 0;
            }
        }
    </style>

</head>

<body>

<h2>SafetyMax Fire Engineers - QR Stickers</h2>

<div class="grid">
    {% for item in data %}
    <div class="sticker">
        <div class="title">SCAN FOR DETAILS</div>
        
        <img src="/qr/{{ item[0] }}">
        
        <div class="id">{{ item[0] }}</div>
    </div>
    {% endfor %}
</div>

</body>
</html>
