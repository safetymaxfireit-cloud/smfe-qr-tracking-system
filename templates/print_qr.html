<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    padding: 10px;
    font-family: Arial;
}

/* LABEL SIZE */
.label {
    width: 50mm;
    height: 30mm;
    border: 1px solid #ccc;

    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;

    padding: 2mm;
    box-sizing: border-box;
}

/* LOGO */
.logo {
    font-size: 7px;
    text-align: center;
}

.logo strong {
    font-size: 9px;
}

/* QR */
.qr img {
    width: 100%;
    max-height: 18mm;
}

/* ID */
.id {
    font-size: 8px;
    font-weight: bold;
    text-align: center;
    width: 100%;
}

/* GRID */
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
}
</style>
</head>

<body>

<div class="container">

{% for item in data %}
<div class="label">

    <div class="logo">
        <strong>SAFETYMAX</strong><br>
        FIRE ENGINEERS
    </div>

    <div class="qr">
        <img src="/qr/{{ item[0] }}">
    </div>

    <div class="id">
        {{ item[0] }}
    </div>

</div>
{% endfor %}

</div>

</body>
</html>
