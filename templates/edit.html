<h2>Edit Extinguisher</h2>

<form method="POST">
    Type: <input name="type" value="{{ data[1] }}"><br><br>
    Location: <input name="location" value="{{ data[2] }}"><br><br>
    Expiry: <input type="date" name="expiry" value="{{ data[3] }}"><br><br>

    <button type="submit">Update</button>
</form>
