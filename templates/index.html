<!DOCTYPE html>
<html>
<head>
    <title>SafetyMax Fire System</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            padding: 30px;
        }

        .container {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: red;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: darkred;
        }

    </style>
</head>

<body>

<div class="container">

<h2>SafetyMax Fire System</h2>

<form method="POST" action="/add-form">

    <label>ID</label>
    <input type="text" name="id" required>

    <label>Type</label>
    <input type="text" name="location" required>

    <label>Location</label>
    <input type="text" name="type" required>

    <label>Expiry Date</label>
    <input type="date" name="expiry_date" required>

    <button type="submit">Add Extinguisher</button>

</form>

<h3>Saved Extinguishers</h3>

<table border="1" width="100%">
    <tr>
        <th>ID</th>
        <th>Type</th>
        <th>Location</th>
        <th>Expiry</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
    </tr>
    {% endfor %}
</table>

</div>

</body>
</html>
